<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Component Gallery</title>
  <link rel="stylesheet" href="components/index.css" />
  <style>
    body { padding: 40px 60px; max-width: 1200px; }
    .gallery-section { margin-bottom: 48px; }
    .gallery-section h2 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--color-text-primary);
    }
    .gallery-section p {
      font-size: 13px;
      color: var(--color-text-muted);
      margin-bottom: 20px;
    }
    .gallery-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: flex-start;
      margin-bottom: 16px;
    }
    .gallery-item {
      display: flex;
      flex-direction: column;
      gap: 6px;
      align-items: flex-start;
    }
    .gallery-label {
      font-size: 11px;
      font-family: monospace;
      color: var(--color-text-muted);
    }
    .gallery-divider {
      height: 1px;
      background: var(--color-border);
      margin: 40px 0;
    }
    .gallery-preview {
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: 20px;
      background: var(--color-bg);
    }
  </style>
</head>
<body>
  <h1 style="margin-bottom: 8px;">Component Gallery</h1>
  <p class="text-muted" style="margin-bottom: 40px;">Visual reference for all wireframe components and their variants.</p>

  <div class="empty-state">
    <div>No components loaded yet</div>
    <div class="text-muted">Use the add-component skill to add components. Each one will appear here automatically.</div>
  </div>

  <!-- New component sections are added here by the add-component skill -->

</body>
</html>
