<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Wireframe Canvas</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a1a;
      color: #ccc;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 48px;
      padding: 0 24px;
      background: #2a2a2a;
      border-bottom: 1px solid #3a3a3a;
      flex-shrink: 0;
    }
    .toolbar__title {
      font-size: 14px;
      font-weight: 600;
      color: #eee;
    }
    .toolbar__count {
      font-size: 13px;
      color: #888;
    }
    .toolbar__zoom {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .toolbar__zoom button {
      width: 28px;
      height: 28px;
      border: 1px solid #444;
      border-radius: 4px;
      background: #333;
      color: #ccc;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }
    .toolbar__zoom button:hover { background: #444; }
    .toolbar__zoom-level {
      font-size: 13px;
      color: #aaa;
      min-width: 40px;
      text-align: center;
    }
    .canvas {
      flex: 1;
      overflow: auto;
      padding: 40px 80px 60px;
    }

    /* Groups */
    .group {
      margin-bottom: 48px;
    }
    .group__header {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      padding: 8px 0;
      margin-bottom: 20px;
      user-select: none;
    }
    .group__arrow {
      font-size: 12px;
      color: #666;
      transition: transform 0.15s;
      width: 16px;
      text-align: center;
    }
    .group--collapsed .group__arrow {
      transform: rotate(-90deg);
    }
    .group__name {
      font-size: 13px;
      font-weight: 600;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .group__count {
      font-size: 12px;
      color: #555;
    }
    .group__screens {
      display: flex;
      gap: 60px;
      align-items: flex-start;
      flex-wrap: wrap;
    }
    .group--collapsed .group__screens {
      display: none;
    }

    /* Frames */
    .frame-wrapper {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
      cursor: pointer;
    }
    .frame-wrapper:hover .frame-container {
      box-shadow: 0 8px 30px rgba(0,0,0,0.4), 0 0 0 2px #555;
    }
    .frame-container {
      overflow: hidden;
      border-radius: 3px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.4);
      transition: box-shadow 0.15s;
    }
    .frame-container iframe {
      display: block;
      width: 1280px;
      height: 720px;
      border: none;
      transform-origin: top left;
      background: #fff;
      pointer-events: none;
    }
    .frame-label {
      font-size: 12px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    /* Fullscreen overlay */
    .fullscreen-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 1000;
      display: flex;
      flex-direction: column;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .fullscreen-overlay.visible { opacity: 1; }
    .fullscreen-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 48px;
      padding: 0 24px;
      background: #1a1a1a;
      border-bottom: 1px solid #333;
      flex-shrink: 0;
    }
    .fullscreen-bar__label {
      font-size: 14px;
      font-weight: 500;
      color: #ccc;
    }
    .fullscreen-bar__close {
      width: 32px;
      height: 32px;
      border: 1px solid #444;
      border-radius: 4px;
      background: #333;
      color: #ccc;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .fullscreen-bar__close:hover { background: #444; }
    .fullscreen-body {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: auto;
      padding: 24px;
    }
    .fullscreen-body iframe {
      width: 1280px;
      height: 720px;
      border: none;
      background: #fff;
      border-radius: 3px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.5);
      max-width: 100%;
      max-height: 100%;
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <div class="toolbar__title">Wireframe canvas</div>
    <div class="toolbar__count" id="screen-count">0 screens</div>
    <div class="toolbar__zoom">
      <button id="zoom-out">&minus;</button>
      <span class="toolbar__zoom-level" id="zoom-level">25%</span>
      <button id="zoom-in">+</button>
    </div>
  </div>
  <div class="canvas" id="canvas"></div>

  <script>
    const ZOOM_STEPS = [0.10, 0.15, 0.20, 0.25, 0.33, 0.50, 0.75, 1.00];
    const FRAME_W = 1280;
    const FRAME_H = 720;
    let zoomIndex = 3;
    let currentData = ''; // JSON string for diffing
    const collapsedGroups = new Set();

    const canvas = document.getElementById('canvas');
    const countEl = document.getElementById('screen-count');
    const zoomEl = document.getElementById('zoom-level');

    function getScale() { return ZOOM_STEPS[zoomIndex]; }

    function updateZoomDisplay() {
      zoomEl.textContent = Math.round(getScale() * 100) + '%';
    }

    function applyZoomToAll() {
      const scale = getScale();
      canvas.querySelectorAll('.frame-wrapper').forEach(wrapper => {
        const iframe = wrapper.querySelector('iframe');
        iframe.style.transform = `scale(${scale})`;
        const container = wrapper.querySelector('.frame-container');
        container.style.width = (FRAME_W * scale) + 'px';
        container.style.height = (FRAME_H * scale) + 'px';
      });
    }

    document.getElementById('zoom-out').addEventListener('click', () => {
      if (zoomIndex > 0) { zoomIndex--; updateZoomDisplay(); applyZoomToAll(); }
    });
    document.getElementById('zoom-in').addEventListener('click', () => {
      if (zoomIndex < ZOOM_STEPS.length - 1) { zoomIndex++; updateZoomDisplay(); applyZoomToAll(); }
    });

    // --- Fullscreen ---

    function openFullscreen(file, label) {
      const overlay = document.createElement('div');
      overlay.className = 'fullscreen-overlay';
      overlay.innerHTML = `
        <div class="fullscreen-bar">
          <span class="fullscreen-bar__label">${label}</span>
          <button class="fullscreen-bar__close">&times;</button>
        </div>
        <div class="fullscreen-body">
          <iframe src="screens/${file}"></iframe>
        </div>
      `;
      document.body.appendChild(overlay);
      requestAnimationFrame(() => overlay.classList.add('visible'));

      const close = () => {
        overlay.classList.remove('visible');
        setTimeout(() => overlay.remove(), 200);
      };
      overlay.querySelector('.fullscreen-bar__close').addEventListener('click', close);
      overlay.addEventListener('click', (e) => {
        if (e.target === overlay || e.target.classList.contains('fullscreen-body')) close();
      });
      document.addEventListener('keydown', function esc(e) {
        if (e.key === 'Escape') { close(); document.removeEventListener('keydown', esc); }
      });
    }

    // --- Frame creation ---

    function createFrame(screen) {
      const scale = getScale();
      const wrapper = document.createElement('div');
      wrapper.className = 'frame-wrapper';
      wrapper.dataset.file = screen.file;

      wrapper.addEventListener('click', () => openFullscreen(screen.file, screen.label));

      const container = document.createElement('div');
      container.className = 'frame-container';
      container.style.width = (FRAME_W * scale) + 'px';
      container.style.height = (FRAME_H * scale) + 'px';

      const iframe = document.createElement('iframe');
      iframe.src = 'screens/' + screen.file;
      iframe.style.transform = `scale(${scale})`;
      container.appendChild(iframe);

      const label = document.createElement('div');
      label.className = 'frame-label';
      label.textContent = screen.label;

      wrapper.appendChild(container);
      wrapper.appendChild(label);
      return wrapper;
    }

    // --- Group creation ---

    function createGroup(groupData) {
      const groupKey = groupData.group || '_ungrouped';
      const el = document.createElement('div');
      el.className = 'group';
      el.dataset.group = groupKey;
      if (collapsedGroups.has(groupKey)) el.classList.add('group--collapsed');

      const header = document.createElement('div');
      header.className = 'group__header';
      header.innerHTML = `
        <span class="group__arrow">&#9660;</span>
        <span class="group__name">${groupData.label}</span>
        <span class="group__count">${groupData.screens.length} screen${groupData.screens.length === 1 ? '' : 's'}</span>
      `;
      header.addEventListener('click', () => {
        el.classList.toggle('group--collapsed');
        if (el.classList.contains('group--collapsed')) {
          collapsedGroups.add(groupKey);
        } else {
          collapsedGroups.delete(groupKey);
        }
      });

      const screensContainer = document.createElement('div');
      screensContainer.className = 'group__screens';
      groupData.screens.forEach(screen => {
        screensContainer.appendChild(createFrame(screen));
      });

      el.appendChild(header);
      el.appendChild(screensContainer);
      return el;
    }

    // --- Polling ---

    async function pollScreens() {
      try {
        const res = await fetch('/api/screens');
        const groups = await res.json();
        const newData = JSON.stringify(groups.map(g => ({ group: g.group, files: g.screens.map(s => s.file) })));

        if (newData === currentData) return;

        // Compute total screen count
        const totalScreens = groups.reduce((sum, g) => sum + g.screens.length, 0);
        countEl.textContent = totalScreens + (totalScreens === 1 ? ' screen' : ' screens');

        // Diff per group
        const existingGroupEls = canvas.querySelectorAll('.group');
        const existingGroupKeys = new Set();
        existingGroupEls.forEach(el => existingGroupKeys.add(el.dataset.group));

        const newGroupKeys = new Set(groups.map(g => g.group || '_ungrouped'));

        // Remove deleted groups
        existingGroupEls.forEach(el => {
          if (!newGroupKeys.has(el.dataset.group)) el.remove();
        });

        // Add or update groups
        groups.forEach(groupData => {
          const groupKey = groupData.group || '_ungrouped';
          let groupEl = canvas.querySelector(`[data-group="${groupKey}"]`);

          if (!groupEl) {
            // New group — create it
            canvas.appendChild(createGroup(groupData));
          } else {
            // Existing group — diff screens within it
            const screensContainer = groupEl.querySelector('.group__screens');
            const existingFiles = new Set();
            screensContainer.querySelectorAll('.frame-wrapper').forEach(w => existingFiles.add(w.dataset.file));

            const newFiles = new Set(groupData.screens.map(s => s.file));

            // Remove deleted screens
            screensContainer.querySelectorAll('.frame-wrapper').forEach(w => {
              if (!newFiles.has(w.dataset.file)) w.remove();
            });

            // Add new screens
            groupData.screens.forEach(screen => {
              if (!existingFiles.has(screen.file)) {
                screensContainer.appendChild(createFrame(screen));
              }
            });

            // Update count in header
            const countSpan = groupEl.querySelector('.group__count');
            countSpan.textContent = groupData.screens.length + ' screen' + (groupData.screens.length === 1 ? '' : 's');
          }
        });

        currentData = newData;
      } catch (e) {
        // silently retry next interval
      }
    }

    updateZoomDisplay();
    pollScreens();
    setInterval(pollScreens, 3000);
  </script>
</body>
</html>
